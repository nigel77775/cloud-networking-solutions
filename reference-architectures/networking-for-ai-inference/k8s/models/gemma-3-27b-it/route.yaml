apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemma-route
spec:
  parentRefs:
    - name: unified-inference-gateway
      namespace: inference-gateway
      sectionName: https
  hostnames:
    - "gateway.internal.example.com"
  rules:
    # Direct access to this model
    - matches:
        - path:
            type: PathPrefix
            value: /models/gemma/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: gemma-3-27b-it-pool
          group: inference.networking.k8s.io
          kind: InferencePool
