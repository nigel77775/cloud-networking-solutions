# HuggingFace API Token Secret - Using GKE Secret Manager Add-on
#
# This configuration uses SecretProviderClass and SecretSync to automatically
# sync secrets from Google Secret Manager to Kubernetes Secrets.
#
# Prerequisites:
# 1. Enable the Secret Manager add-on on your GKE cluster
# 2. Create a Kubernetes Service Account (KSA) with Workload Identity binding
# 3. Grant the KSA access to the secret in Secret Manager
#
# For more details see:
# https://cloud.google.com/secret-manager/docs/sync-k8-secrets
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
    name: hf-secret-provider
    namespace: default
spec:
    provider: gke
    parameters:
        secrets: |
            - resourceName: "projects/PLACEHOLDER_PROJECT_ID/secrets/huggingface-token/versions/latest"
              path: "hf_api_token.txt"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
    name: hf-secret
    namespace: default
spec:
    serviceAccountName: default
    secretProviderClassName: hf-secret-provider
    secretObject:
        type: Opaque
        data:
            - sourcePath: "hf_api_token.txt"
              targetKey: "hf_api_token"
