apiVersion: apps/v1
kind: Deployment
metadata:
    name: vllm-deployment
    labels:
        app.kubernetes.io/name: vllm-server
        app.kubernetes.io/component: inference-server
spec:
    replicas: 1
    selector:
        matchLabels:
            app: vllm-server
    template:
        metadata:
            labels:
                app: vllm-server
                ai.gke.io/model: base-model
                ai.gke.io/inference-server: vllm
                examples.ai.gke.io/source: user-guide
        spec:
            nodeSelector:
                cloud.google.com/compute-class: dws-flex-h100
            containers:
                - name: inference-server
                  image: docker.io/vllm/vllm-openai:v0.15.1
                  resources:
                      requests:
                          cpu: "10"
                          memory: "128Gi"
                          ephemeral-storage: "120Gi"
                          nvidia.com/gpu: "1"
                      limits:
                          cpu: "10"
                          memory: "128Gi"
                          ephemeral-storage: "120Gi"
                          nvidia.com/gpu: "1"
                  command:
                      ["python3", "-m", "vllm.entrypoints.openai.api_server"]
                  args:
                      - --model=$(MODEL_ID)
                      - --tensor-parallel-size=1
                      - --host=0.0.0.0
                      - --port=8000
                      - --swap-space=16
                      - --gpu-memory-utilization=0.90
                      - --max-model-len=32768
                      - --max-num-seqs=256
                      - --enable-prefix-caching
                  env:
                      - name: LD_LIBRARY_PATH
                        value: ${LD_LIBRARY_PATH}:/usr/local/nvidia/lib64
                      - name: MODEL_ID
                        value: base-model-id
                      - name: HUGGING_FACE_HUB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: hf-secret
                                key: hf_api_token
                  volumeMounts:
                      - mountPath: /dev/shm
                        name: dshm
                  startupProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      failureThreshold: 60
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      initialDelaySeconds: 180
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      initialDelaySeconds: 300
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 3
            terminationGracePeriodSeconds: 60
            volumes:
                - name: dshm
                  emptyDir:
                      medium: Memory
