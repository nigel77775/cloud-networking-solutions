# InferencePool with Endpoint Picker (EPP)
# This file contains all resources needed for intelligent request routing
# Resource names use a generic pattern that will be prefixed by the model overlay
---
# ServiceAccount for metrics reader
apiVersion: v1
kind: ServiceAccount
metadata:
    name: metrics-reader-sa

---
# ServiceAccount for EPP
apiVersion: v1
kind: ServiceAccount
metadata:
    name: epp

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
---
# Secret for metrics reader token
apiVersion: v1
kind: Secret
metadata:
    name: metrics-reader-secret

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
    annotations:
        kubernetes.io/service-account.name: metrics-reader-sa
type: kubernetes.io/service-account-token
---
# EPP Configuration
apiVersion: v1
kind: ConfigMap
metadata:
    name: epp-config

data:
    default-plugins.yaml: |
        apiVersion: inference.networking.x-k8s.io/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: prefix-cache-scorer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: queue-scorer
          - pluginRef: kv-cache-utilization-scorer
          - pluginRef: prefix-cache-scorer
---
# ClusterRole for metrics reader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: metrics-reader
rules:
    - nonResourceURLs:
          - /metrics
      verbs:
          - get
---
# ClusterRole for EPP
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
    name: epp-role
    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
rules:
    - apiGroups:
          - authentication.k8s.io
      resources:
          - tokenreviews
      verbs:
          - create
    - apiGroups:
          - authorization.k8s.io
      resources:
          - subjectaccessreviews
      verbs:
          - create
---
# ClusterRoleBinding for metrics reader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: metrics-reader-binding
subjects:
    - kind: ServiceAccount
      name: metrics-reader-sa

roleRef:
    kind: ClusterRole
    name: metrics-reader
    apiGroup: rbac.authorization.k8s.io
---
# ClusterRoleBinding for EPP
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
    name: epp-binding
subjects:
    - kind: ServiceAccount
      name: epp

roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: epp-role
---
# Role for reading secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: metrics-reader-secret-read
rules:
    - resources:
          - secrets
      apiGroups: [""]
      verbs: ["get", "list", "watch"]
      resourceNames: ["metrics-reader-secret"]
---
# Role for EPP
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: epp-role

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
rules:
    - apiGroups: ["inference.networking.x-k8s.io"]
      resources: ["inferenceobjectives"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["inference.networking.k8s.io"]
      resources: ["inferencepools"]
      verbs: ["get", "watch", "list"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "watch", "list"]
---
# RoleBinding for GMP collector
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: gmp-collector-secret-read

roleRef:
    name: metrics-reader-secret-read
    kind: Role
    apiGroup: rbac.authorization.k8s.io
subjects:
    - name: collector
      namespace: gmp-system
      kind: ServiceAccount
---
# RoleBinding for EPP
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: epp-binding

subjects:
    - kind: ServiceAccount
      name: epp

roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: epp-role
---
# EPP Service
apiVersion: v1
kind: Service
metadata:
    name: epp

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    selector:
        app.kubernetes.io/name: epp
    ports:
        - name: grpc-ext-proc
          protocol: TCP
          port: 9002
        - name: http-metrics
          protocol: TCP
          port: 9090
    type: ClusterIP
---
# EPP Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: epp

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: epp
    template:
        metadata:
            labels:
                app.kubernetes.io/name: epp
        spec:
            serviceAccountName: epp
            terminationGracePeriodSeconds: 130
            containers:
                - name: epp
                  image: registry.k8s.io/gateway-api-inference-extension/epp:v1.0.1
                  imagePullPolicy: Always
                  args:
                      - --pool-name
                      - base-pool
                      - --pool-namespace
                      - NAMESPACE_PLACEHOLDER
                      - --pool-group
                      - "inference.networking.k8s.io"
                      - --zap-encoder
                      - "json"
                      - --config-file
                      - "/config/default-plugins.yaml"
                      - --kv-cache-usage-percentage-metric=vllm:kv_cache_usage_perc
                      - "--v"
                      - "1"
                  ports:
                      - name: grpc
                        containerPort: 9002
                      - name: grpc-health
                        containerPort: 9003
                      - name: metrics
                        containerPort: 9090
                  livenessProbe:
                      grpc:
                          port: 9003
                          service: inference-extension
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      grpc:
                          port: 9003
                          service: inference-extension
                      periodSeconds: 2
                  env:
                      - name: NAMESPACE
                        valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                  volumeMounts:
                      - name: plugins-config-volume
                        mountPath: "/config"
                  resources:
                      requests:
                          cpu: "100m"
                          memory: "256Mi"
                      limits:
                          cpu: "500m"
                          memory: "512Mi"
            volumes:
                - name: plugins-config-volume
                  configMap:
                      name: epp-config
---
# GCPBackendPolicy for InferencePool
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
    name: pool-backend-policy

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    targetRef:
        group: "inference.networking.k8s.io"
        kind: InferencePool
        name: pool
    default:
        timeoutSec: 300
        logging:
            enabled: true
---
# HealthCheckPolicy for InferencePool
kind: HealthCheckPolicy
apiVersion: networking.gke.io/v1
metadata:
    name: pool-health-check

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    targetRef:
        group: "inference.networking.k8s.io"
        kind: InferencePool
        name: pool
    default:
        timeoutSec: 2
        checkIntervalSec: 2
        config:
            type: HTTP
            httpHealthCheck:
                requestPath: /health
                port: 8000
---
# InferencePool
apiVersion: "inference.networking.k8s.io/v1"
kind: InferencePool
metadata:
    name: pool

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    targetPorts:
        - number: 8000
    selector:
        matchLabels:
            app: vllm-server
    endpointPickerRef:
        name: epp
        port:
            number: 9002
---
# PodMonitoring for metrics
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
    name: epp-monitoring

    labels:
        app.kubernetes.io/name: epp
        app.kubernetes.io/version: "v1.0.1"
spec:
    endpoints:
        - port: metrics
          scheme: http
          interval: 10s
          path: /metrics
          authorization:
              type: Bearer
              credentials:
                  secret:
                      name: metrics-reader-secret
                      key: token
    selector:
        matchLabels:
            app.kubernetes.io/name: epp
---
# InferenceObjective for priority-based routing
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
    name: objective
spec:
    priority: 10
    poolRef:
        name: pool
        group: "inference.networking.x-k8s.io"
