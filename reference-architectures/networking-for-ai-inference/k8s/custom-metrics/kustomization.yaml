apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Custom Metrics Stackdriver Adapter
#
# Deploys the adapter that enables HPA to scale based on Cloud Monitoring metrics,
# including Prometheus metrics collected by Google Managed Prometheus (GMP).
#
# This must be deployed BEFORE the main inference deployment if using HPA.
#
# Prerequisites:
#   1. GKE cluster with Workload Identity enabled
#   2. IAM binding for custom-metrics-stackdriver-adapter (configured in Terraform)
#
# Usage: kubectl apply -k kubernetes/inference-gateway/custom-metrics
#
# IMPORTANT: This component has specific namespace requirements:
# - Most resources go to 'custom-metrics' namespace
# - The auth-reader RoleBinding MUST be in 'kube-system'
# - Parent kustomization namespace override is NOT applied here

# Do not set namespace here - resources define their own namespaces
# namespace: custom-metrics  # Intentionally commented out

resources:
    - custom-metrics-adapter.yaml

labels:
    - pairs:
          app.kubernetes.io/part-of: inference-gateway
          app.kubernetes.io/component: custom-metrics
          app.kubernetes.io/managed-by: kustomize
      includeSelectors: false
